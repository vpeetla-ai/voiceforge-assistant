name: Deploy Production

on:
  push:
    branches: [main]
    paths:
      - "ui/**"
      - ".github/workflows/deploy.yml"

concurrency:
  group: voiceforge-ui-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-gate:
    name: Build UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Install + build
        working-directory: ui
        run: |
          npm ci
          npm run build

  deploy-ui:
    name: Deploy UI (Vercel)
    needs: build-gate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Deploy to Vercel
        working-directory: ui
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "${VERCEL_TOKEN}" ] || [ -z "${VERCEL_ORG_ID}" ] || [ -z "${VERCEL_PROJECT_ID}" ]; then
            echo "::warning::VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID not fully configured"
            echo "Manual fallback: cd ui && vercel link --project voiceforge-assistant-edaf && vercel --prod"
            exit 0
          fi
          npm ci
          npx vercel@latest deploy --prod --token "${VERCEL_TOKEN}" --yes
